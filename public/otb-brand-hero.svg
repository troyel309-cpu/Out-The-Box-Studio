      <stop offset=".45" stop-color="#F6FFF0"/>
      <stop offset="1" stop-color="#B8D7FF"/>
    </linearGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="34" stdDeviation="36" flood-color="#000000" flood-opacity=".5"/>
      <feDropShadow dx="0" dy="0" stdDeviation="28" flood-color="#36E6FF" flood-opacity=".34"/>
    </filter>

    <filter id="letterShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000000" flood-opacity=".65"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#C8FF68" flood-opacity=".32"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <ellipse cx="600" cy="1030" rx="370" ry="80" fill="#000" opacity=".42"/>

    <path d="M218 572 600 770 982 572V930L600 1128 218 930V572Z"
      fill="url(#front)" stroke="url(#edge)" stroke-width="24" stroke-linejoin="round"/>

    <path d="M218 572 600 770 982 572M600 770V1128"

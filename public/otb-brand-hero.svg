        stroke="#FFFFFF"
        stroke-width="5"
        paint-order="stroke"
        font-size="290"
        font-family="Arial Black, Arial, Helvetica, sans-serif"
        font-weight="900"
        letter-spacing="-24">OTB</text>
    </g>

    <path d="m970 190 16 48 48 16-48 16-16 48-16-48-48-16 48-16 16-48Z" fill="#C8FF68"/>
    <path d="m214 334 11 33 33 11-33 11-11 33-11-33-33-11 33-11 11-33Z" fill="#36E6FF"/>
    <path d="m862 394 10 30 30 10-30 10-10 30-10-30-30-10 30-10 10-30Z" fill="#8D68FF"/>

<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="edge" x1="170" y1="130" x2="1030" y2="1030" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C8FF68"/>
      <stop offset=".45" stop-color="#36E6FF"/>
      <stop offset="1" stop-color="#8D68FF"/>
    </linearGradient>

    <linearGradient id="front" x1="300" y1="500" x2="730" y2="1050" gradientUnits="userSpaceOnUse">
      <stop stop-color="#132544"/>
      <stop offset="1" stop-color="#07101C"/>
    </linearGradient>

    <linearGradient id="lid" x1="240" y1="310" x2="970" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172C4E"/>
      <stop offset="1" stop-color="#0A1120"/>
    </linearGradient>

    <radialGradient id="burst" cx="0" cy="0" r="1" gradientTransform="translate(600 470) rotate(90) scale(420)">
      <stop stop-color="#FFFFFF"/>
      <stop offset=".12" stop-color="#E7FFF8"/>
      <stop offset=".34" stop-color="#7CF6FF" stop-opacity=".95"/>
      <stop offset=".62" stop-color="#4BDAFF" stop-opacity=".42"/>
      <stop offset="1" stop-color="#4BDAFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="letters" x1="390" y1="160" x2="820" y2="600">
